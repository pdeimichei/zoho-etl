name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version from tag
        shell: python
        env:
          TAG: ${{ github.ref_name }}
        run: |
          import os
          version = os.environ["TAG"].lstrip("v")
          with open("src/_version.py", "w") as f:
              f.write(f'__version__ = "{version}"\n')

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Zip the .app bundle
        run: |
          cd dist
          zip -r ZohoETL-macOS.zip ZohoETL.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZohoETL-macOS
          path: dist/ZohoETL-macOS.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set version from tag
        shell: python
        env:
          TAG: ${{ github.ref_name }}
        run: |
          import os
          version = os.environ["TAG"].lstrip("v")
          with open("src/_version.py", "w") as f:
              f.write(f'__version__ = "{version}"\n')

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller build.spec

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZohoETL-Windows
          path: dist/ZohoETL.exe

  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ZohoETL-macOS

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ZohoETL-Windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Zoho ETL ${{ github.ref_name }}"
          body: |
            ## Zoho ETL ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `ZohoETL-macOS.zip` — extract and move `ZohoETL.app` to Applications |
            | Windows | `ZohoETL.exe` — run directly, no installation needed |
          files: |
            ZohoETL-macOS.zip
            ZohoETL.exe
          make_latest: true
